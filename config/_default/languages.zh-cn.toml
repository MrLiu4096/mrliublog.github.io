disabled = false                            # 是否禁用该语言（单语言博客必须为 false）
languageCode = "zh-cn"                      # 语言代码，与基础配置中的 defaultContentLanguage 对应
languageName = "简体中文"                    # 语言的显示名称（多语言网站切换器里显示的名字）
weight = 1                                  # 语言的排序权重
title = "Mr Liu的博客"                       # 网站的主标题，会显示在浏览器标签页、顶部导航栏和搜索引擎结果中

[params]
  displayName = "简中"                      # 语言的简短显示名称
  isoCode = "zh-cn"                         # 用于网页底层 HTML 标签规范的 ISO 语言代码
  rtl = false                               # 文字阅读方向是否为“从右向左”（中文必须为 false）
  
  # 全站默认的日期显示格式。
  # 注意：Hugo 底层使用 Go 语言，它的时间占位符非常奇葩，必须严格使用 "2006" 代表年，"01" 代表月，"02" 代表日。千万不要改成 YYYY-MM-DD。
  dateFormat = "2006-01-02" 
  
  # logo = "img/avatar.webp"                                      # 网站的 Logo 图片路径（放在静态资源文件夹 assets/img 或 static/img 下）
  # secondaryLogo = "img/secondary-logo.png"                      # 备用 Logo（比如在暗色模式下自动切换为白色的 Logo）
  description = "记录摄影随拍与数码折腾日常"                        # 网站的 SEO 描述，别人在搜索引擎里看到的网站简介
  copyright = "© 2023 - { year } [Mr Liu](/about/)"               # 自定义页脚的版权声明，支持 Markdown 语法和 Emoji 表情

[params.author]
   name = "Mr Liu" # 你的名字，会展示在主页个人名片、文章作者栏和关于页面
#  email = "youremail@example.com" # 你的公开联系邮箱
   image = "img/avatar.webp" # 你的个人头像图片路径。用 WebP 格式很好，加载速度快
   imageQuality = 96 # 头像图片在被主题自动处理和缩放时的压缩质量（0-100）
   headline = "笔耕不辍，静候佳音" # 你的个人一句话签名，会加粗显示在主页头像的下方
#  bio = "喜欢拍拍照、瞎折腾软硬件。家里有一只一岁的三花主子。" # 你的详细个人简介，显示在一句话签名的下方

